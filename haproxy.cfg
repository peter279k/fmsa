global
    log stdout format raw local0
    maxconn 50000 
    tune.bufsize 32768
    nbthread 4 

defaults
    log global
    mode http
    option httplog
    option dontlognull
    option http-server-close
    timeout connect 10000ms
    timeout client 60000ms
    timeout server 60000ms

frontend http_front
    bind *:8081
    mode http
    default_backend http_back

backend http_back
    mode http
    balance roundrobin
    option forwardfor
    server nginx nginx:80 check
